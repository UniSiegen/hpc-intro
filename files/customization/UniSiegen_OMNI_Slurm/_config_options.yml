# ---------------------------------------------------------------
# HPC Carpentries in the Cloud: Slurm + Software Stack from EESSI
# ---------------------------------------------------------------
#
# The HPC Carpentry Cluster in the Cloud is provided as a public
# service by volunteers. It is provisioned with Magic Castle
# <https://github.com/ComputeCanada/magic_castle> using the EESSI
# <https://eessi.github.io/docs/> software stack. If you need an
# account, please visit <cluster.hpc-carpentry.org>.
#
# Compute responsibly.
---

snippets: "UniSiegen_OMNI_Slurm"

local:
  prompt: "[you@laptop:~]$"
  shebang: "#!/bin/bash"

remote:
  name: "OMNI Cluster Siegen"
  login: "omni.zimt.uni-siegen.de"
  portal: "https://cluster.uni-siegen.de/"
  host: "hpc-login02"
  node: "smnode1"
  location: "cluster.hpc-carpentry.org"
  homedir: "/home"
  user: "username"
  module_python3: "Python"
  prompt: "[username@hpc-login02 ~]$"
  shebang: "#!/bin/bash"
  modules:
    python: "Python"


sched:
  name: "Slurm"
  submit:
    name: "sbatch"
    options: ""
  queue:
    debug: "smnode"
    testing: "cpubase_bycore_b1"
  status: "squeue"
  flag:
    user: "-u username"
    interactive: ""
    histdetail: "-l -j"
    name: "-J"
    time: "-t"
    queue: "-p"
  del: "scancel"
  interactive: "srun"
  info: "sinfo"
  comment: "#SBATCH"
  hist: "sacct -u username"
  hist_filter: ""

episode_order:
  - 10-hpc-intro
  - 11-connecting
  - 12-cluster
  - 13-scheduler
  - 14-environment-variables
  - 15-modules
  - 16-transferring-files
  - 17-parallel
  - 18-resources
  - 19-responsibility
